release:
  stage: release
  image: node:24
  before_script:
    - |
      if [ -z "$RELEASE_GITLAB_TOKEN" ]; then
        echo "Error: RELEASE_GITLAB_TOKEN is not set. Please add it to your CI/CD variables (Settings > CI/CD > Variables)."
        exit 1
      fi
    # Configure git to use the token for the repository URL
    - git config --global user.email "starlight-tech-radar@ele.codes"
    - git config --global user.name "Starlight Tech Radar Bot"
    # Replace any existing authentication in the URL with oauth2 and the RELEASE_GITLAB_TOKEN
    - export REPO_URL=$(echo $CI_REPOSITORY_URL | sed -e "s|://.*@|://oauth2:${RELEASE_GITLAB_TOKEN}@|")
    - git remote set-url origin $REPO_URL
  script:
    - npx semantic-release
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  needs:
    - job: install_dependencies
    - job: unit_test
    - job: e2e_test
    - job: build_app
