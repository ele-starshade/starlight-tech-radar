unit_test:
  stage: test
  image: node:24
  dependencies:
    - install_dependencies
  script:
    - npx vitest run --coverage
  artifacts:
    when: always
    paths:
      - coverage/
    expire_in: 30 days

e2e_test:
  stage: test
  image: mcr.microsoft.com/playwright:v1.58.2-noble
  dependencies:
    - install_dependencies
    - build_app
  script:
    # Playwright requires its own browser installation
    - npx playwright install --with-deps
    
    # Install Java for WireMock
    - apt-get update && apt-get install -y default-jre wget
    
    # Download and start WireMock in the background
    - wget https://repo1.maven.org/maven2/org/wiremock/wiremock-standalone/3.12.1/wiremock-standalone-3.12.1.jar
    - java -jar wiremock-standalone-3.12.1.jar --port 8080 --root-dir ./test/wiremock &
    
    # Wait for WireMock to start listening on port 8080
    - timeout 30 bash -c 'while ! echo > /dev/tcp/localhost/8080; do sleep 1; done'
    
    # Run End-to-End tests
    - npm run test:e2e:ci
  artifacts:
    when: always
    paths:
      - playwright-report/
      - test-results/
      - .nyc_output/
    expire_in: 30 days

coverage_report:
  stage: coverage
  image: node:24
  dependencies:
    - install_dependencies
    - unit_test
    - e2e_test
  script:
    - mkdir -p .nyc_output
    - cp coverage/unit/coverage-final.json .nyc_output/unit.json || true
    - npx nyc report -t .nyc_output --report-dir coverage/combined --reporter=text --reporter=cobertura --reporter=html --extension .vue --extension .ts --extension .js
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/combined/cobertura-coverage.xml
    paths:
      - coverage/combined/
    expire_in: 30 days

npm_audit:
  stage: test
  image: node:24
  dependencies:
    - install_dependencies
  script:
    - npm audit --audit-level=moderate
  allow_failure: true
