lint_code:
  stage: code-quality
  image: node:24
  dependencies:
    - install_dependencies
  script:
    - npm run lint

type_check:
  stage: code-quality
  image: node:24
  dependencies:
    - install_dependencies
  script:
    - npm run type-check

sonar_scan:
  stage: code-quality
  image:
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"  # Defines the location of the analysis task cache
    GIT_DEPTH: "0"  # Tells git to fetch all the branches of the project, required by the analysis task
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  script:
    - sonar-scanner
  allow_failure: true
  rules:
    # Only run if SONAR_TOKEN is set in CI/CD variables
    - if: $SONAR_TOKEN && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
