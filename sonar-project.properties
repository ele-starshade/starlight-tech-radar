sonar.projectKey=ele.starshade_starlight-tech-radar
sonar.organization=ele-starshade

# This is the name and version displayed in the SonarCloud UI.
sonar.projectName=Starlight Tech Radar
sonar.projectVersion=0.0.1

# Path is relative to the sonar-project.properties file. Replace "" by "/" on Windows.
sonar.sources=src
sonar.tests=test/unit

# File Suffixes
# Exclude .vue from HTML to prevent "unrecognized attribute" errors on @ directives
sonar.html.file.suffixes=.html,.xhtml
sonar.javascript.file.suffixes=.js,.jsx,.vue
sonar.typescript.file.suffixes=.ts,.tsx,.vue

# Exclusions
sonar.exclusions=**/__snapshots__/**, **/*.d.ts

# Coverage
# Assuming Vitest/nyc generates lcov coverage reports
sonar.javascript.lcov.reportPaths=coverage/combined/lcov.info
