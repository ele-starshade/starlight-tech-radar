stages:
  - install
  - build
  - test
  - coverage
  - code-quality
  - release

include:
  - local: '.gitlab/ci/install.yml'
  - local: '.gitlab/ci/build.yml'
  - local: '.gitlab/ci/code-quality.yml'
  - local: '.gitlab/ci/test.yml'
  - local: '.gitlab/ci/release.yml'
  
  # GitLab CI/CD Components (Free Tier)
  # These automatically inject jobs into the "test" stage by default
  - component: $CI_SERVER_FQDN/components/secret-detection/secret-detection@1
  - component: $CI_SERVER_FQDN/components/sast/sast@2
